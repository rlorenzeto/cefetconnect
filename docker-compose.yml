version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cefet_db
    # O comando abaixo força o MySQL a ignorar maiúsculas/minúsculas em nomes de tabelas
    command: --lower-case-table-names=1 
    environment:
      MYSQL_ROOT_PASSWORD: SenhaRootForte2026!
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  backend:
    build: ./api_cefetconnect
    container_name: cefet_backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: always

  frontend:
    build: ./cefet-connect-frontend
    container_name: cefet_frontend
    ports:
      - "5173:5173"
    restart: always

volumes:
  db_data:
